<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT CI/CD Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-12 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-500">IoT CI/CD Dashboard</h1>
                <p class="text-gray-400">Monitoring GitHub Actions & S3 Deployment</p>
            </div>
            <div class="flex items-center gap-2 bg-gray-800 px-4 py-2 rounded-full">
                <div id="status-dot" class="w-3 h-3 bg-gray-500 rounded-full animate-pulse"></div>
                <span id="status-text" class="text-sm font-medium text-gray-300">Checking GitHub...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm mb-2 uppercase tracking-wider font-semibold">Latest Build Status</h3>
                <p id="build-status" class="text-2xl font-bold">---</p>
                <p id="build-id" class="text-xs text-gray-500 mt-2">Run ID: ---</p>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm mb-2 uppercase tracking-wider font-semibold">Current Firmware</h3>
                <p id="firmware-version" class="text-2xl font-bold text-green-400">v2.0 (Stable)</p>
                <p id="commit-msg" class="text-xs text-gray-500 mt-2 italic truncate">Waiting for data...</p>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm mb-2 uppercase tracking-wider font-semibold">Last Deployment</h3>
                <p id="last-updated" class="text-2xl font-bold">---</p>
                <p class="text-xs text-gray-500 mt-2">Target: AWS S3</p>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-700 bg-gray-800/50">
                <h3 class="font-bold">Deployment History (Recent Workflow Runs)</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-gray-300">
                    <thead class="bg-gray-900/50 text-xs uppercase text-gray-500">
                        <tr>
                            <th class="px-6 py-3">Workflow Run</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Date</th>
                            <th class="px-6 py-3">Action</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIG: Ye details badal lena
        const GITHUB_TOKEN = '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'; 
        const REPO_OWNER = 'mohitchandwai'; // Apna GitHub username dalo
        const REPO_NAME = 'esp8266-ota-automation'; // Apna Repo name dalo

        async function fetchGitHubData() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                const data = await response.json();
                const latestRun = data.workflow_runs[0];

                // Update Build Status
                const buildStatus = document.getElementById('build-status');
                const statusDot = document.getElementById('status-dot');
                
                if (latestRun.status === 'completed') {
                    buildStatus.innerText = latestRun.conclusion.toUpperCase();
                    buildStatus.className = latestRun.conclusion === 'success' ? 'text-2xl font-bold text-green-500' : 'text-2xl font-bold text-red-500';
                    statusDot.className = 'w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]';
                    document.getElementById('status-text').innerText = 'System Live';
                } else {
                    buildStatus.innerText = 'IN PROGRESS...';
                    buildStatus.className = 'text-2xl font-bold text-yellow-500';
                }

                // Update Version & Commit
                document.getElementById('commit-msg').innerText = latestRun.head_commit.message;
                document.getElementById('build-id').innerText = `Run ID: ${latestRun.id}`;
                
                // Update Time
                const date = new Date(latestRun.updated_at);
                document.getElementById('last-updated').innerText = date.toLocaleTimeString();

                // Fill Table
                const tableBody = document.getElementById('history-table-body');
                tableBody.innerHTML = '';
                data.workflow_runs.slice(0, 5).forEach(run => {
                    const row = `
                        <tr class="border-b border-gray-700 hover:bg-gray-700/30 transition">
                            <td class="px-6 py-4 font-medium text-white">${run.name} (#${run.run_number})</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded text-xs ${run.conclusion === 'success' ? 'bg-green-900/30 text-green-400' : 'bg-red-900/30 text-red-400'}">
                                    ${run.conclusion}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500">${new Date(run.created_at).toLocaleString()}</td>
                            <td class="px-6 py-4"><a href="${run.html_url}" target="_blank" class="text-blue-400 hover:underline text-sm font-semibold">View Logs</a></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('status-text').innerText = 'API Error';
            }
        }

        // Fetch every 30 seconds
        fetchGitHubData();
        setInterval(fetchGitHubData, 30000);
    </script>
</body>
</html>
